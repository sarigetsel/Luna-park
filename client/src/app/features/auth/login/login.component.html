<div class="auth-page">
  <div class="auth-visual">
    <div class="visual-slides">
      <div class="visual-slide s1"></div>
      <div class="visual-slide s2"></div>
      <div class="visual-slide s3"></div>
    </div>
    <div class="visual-content">
      <h2>Luna Park</h2>
      <p>הצטרפו להרפתקה — מתקנים, כרטיסים וקסם לילי</p>
    </div>
  </div>

  <div class="auth-form-side">
    <mat-card class="auth-card">
      <mat-card-header>
        <mat-card-title>התחברות</mat-card-title>
        <mat-card-subtitle>ברוכים השבים ל-Luna Park</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="submit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>אימייל</mat-label>
            <input matInput type="email" formControlName="email" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>סיסמה</mat-label>
            <input matInput type="password" formControlName="password" />
          </mat-form-field>

          <button mat-flat-button color="primary" class="submit-btn" type="submit" [disabled]="loading()">
            {{ loading() ? 'מתחבר...' : 'התחברות' }}
          </button>
        </form>
      </mat-card-content>
      <mat-card-actions align="end">
        <a routerLink="/register">אין לכם חשבון? הרשמו כאן</a>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
