<div class="auth-page">
  <div class="auth-visual">
    <div class="visual-bg"></div>
    <div class="visual-content">
      <h2>הצטרפו ל-Luna Park</h2>
      <p>הרשמו עכשיו והזמינו כרטיסים למתקנים הכי מרגשים</p>
    </div>
  </div>

  <div class="auth-form-side">
    <mat-card class="auth-card">
      <mat-card-header>
        <mat-card-title>הרשמה</mat-card-title>
        <mat-card-subtitle>יצירת חשבון חדש</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="submit()">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>שם מלא</mat-label>
            <input matInput formControlName="name" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>אימייל</mat-label>
            <input matInput type="email" formControlName="email" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>סיסמה</mat-label>
            <input matInput type="password" formControlName="password" />
          </mat-form-field>

          <button mat-flat-button color="primary" class="submit-btn" type="submit" [disabled]="loading()">
            {{ loading() ? 'יוצר חשבון...' : 'הרשמה' }}
          </button>
        </form>
      </mat-card-content>
      <mat-card-actions align="end">
        <a routerLink="/login">כבר יש לכם חשבון? התחברו</a>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
